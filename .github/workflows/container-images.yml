name: Container Images

on:
  push:
    branches: [main]
    paths:
      - "containers/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/**"
      - "proto/**"
      - ".github/workflows/container-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    runs-on: ubuntu-latest
    outputs:
      base-image: ${{ steps.base-ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/apme-base
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - id: base-ref
        run: echo "image=${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/apme-base:${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

  build-images:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: primary
            file: containers/primary/Dockerfile
          - name: native
            file: containers/native/Dockerfile
          - name: opa
            file: containers/opa/Dockerfile
          - name: ansible
            file: containers/ansible/Dockerfile
          - name: galaxy-proxy
            file: containers/galaxy-proxy/Dockerfile
          - name: gitleaks
            file: containers/gitleaks/Dockerfile
          - name: gateway
            file: containers/gateway/Dockerfile
          - name: cli
            file: containers/cli/Dockerfile
          - name: ui
            file: containers/ui/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/apme-${{ matrix.image.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-base.outputs.base-image }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
