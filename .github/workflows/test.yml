---
name: test

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  PY_COLORS: 1

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - run: uvx --with tox-uv tox -e unit
      - name: Fail if git reports dirty
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "::error::Git reports modified/untracked files after test run"
            git status -s
            exit 1
          fi

  integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - name: Install OPA binary
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version
      - run: uvx --with tox-uv tox -e integration
        env:
          OPA_USE_PODMAN: "0"
      - name: Retry integration on timeout
        if: failure()
        run: uvx --with tox-uv tox -e integration
        env:
          OPA_USE_PODMAN: "0"

  ui:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install OPA binary
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
      - name: Get Playwright version
        id: pw
        run: echo "version=$(grep -A1 'name = "playwright"' uv.lock | grep version | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright (browser + system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run --extra dev playwright install --with-deps chromium
      - name: Build and serve UI
        run: |
          cd frontend && npm ci && npm run build && cd ..
          uv run python -m apme_gateway.main &
          npx serve frontend/dist -l 8081 -s &
          sleep 3
        env:
          APME_DB_PATH: /tmp/apme-ui-test.db
          APME_GATEWAY_GRPC_LISTEN: 127.0.0.1:50060
          APME_GATEWAY_HTTP_HOST: 127.0.0.1
          APME_GATEWAY_HTTP_PORT: 8080
      - run: uvx --with tox-uv tox -e ui
        env:
          APME_UI_URL: http://localhost:8081
          APME_DB_PATH: /tmp/apme-ui-test.db
          APME_GATEWAY_HTTP_HOST: 127.0.0.1
          APME_GATEWAY_HTTP_PORT: 8080

  test-ai-extra:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - run: uvx --with tox-uv tox -e ai
