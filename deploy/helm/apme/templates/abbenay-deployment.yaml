{{- if .Values.abbenay.enabled }}
{{- $fullname := include "apme.fullname" . -}}
{{- $hasGcpCreds := or .Values.abbenay.gcp.serviceAccountKey .Values.abbenay.gcp.existingSecret -}}
{{- $hasVertexADC := false -}}
{{- range $name, $provider := .Values.abbenay.providers }}
  {{- if and (eq $provider.engine "vertex-anthropic") (not $provider.baseUrl) (not $provider.apiKey) (not $provider.apiKeySecret) }}
    {{- $hasVertexADC = true -}}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-abbenay
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: abbenay
  template:
    metadata:
      labels:
        {{- include "apme.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: abbenay
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "apme.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: abbenay
          image: {{ .Values.abbenay.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args: ["daemon", "--grpc-host", "0.0.0.0", "--grpc-port", "50057"]
          env:
            - name: APME_ABBENAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: abbenay-token
            {{- if .Values.abbenay.aiModel }}
            - name: APME_AI_MODEL
              value: {{ .Values.abbenay.aiModel | quote }}
            {{- end }}
            - name: XDG_RUNTIME_DIR
              value: /tmp/abbenay-run
            - name: XDG_CONFIG_HOME
              value: /etc/abbenay-config
            {{- /* GCP ADC env vars for vertex-anthropic providers using direct Vertex AI */ -}}
            {{- if $hasVertexADC }}
            {{- if $hasGcpCreds }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/service-account-key.json
            {{- end }}
            {{- with .Values.abbenay.gcp }}
            {{- if .project }}
            - name: GOOGLE_VERTEX_PROJECT
              value: {{ .project | quote }}
            {{- end }}
            {{- if .location }}
            - name: GOOGLE_VERTEX_LOCATION
              value: {{ .location | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- /* Per-provider API key env vars */ -}}
            {{- range $name, $provider := .Values.abbenay.providers }}
            {{- $envName := printf "ABBENAY_PROVIDER_%s" (upper (replace "-" "_" $name)) }}
            {{- if $provider.apiKey }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: provider-{{ $name }}-api-key
            {{- else if $provider.apiKeySecret }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $provider.apiKeySecret.name }}
                  key: {{ $provider.apiKeySecret.key }}
            {{- end }}
            {{- with $provider.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: 50057
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.abbenay.resources | nindent 12 }}
          volumeMounts:
            - name: abbenay-config
              mountPath: /etc/abbenay-config/abbenay
              readOnly: true
            {{- if and $hasVertexADC $hasGcpCreds }}
            - name: gcp-credentials
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
      volumes:
        - name: abbenay-config
          configMap:
            name: {{ $fullname }}-abbenay-config
        {{- if and $hasVertexADC $hasGcpCreds }}
        - name: gcp-credentials
          secret:
            secretName: {{ if .Values.abbenay.gcp.serviceAccountKey }}{{ $fullname }}-gcp-credentials{{ else }}{{ .Values.abbenay.gcp.existingSecret }}{{ end }}
        {{- end }}
{{- end }}
