{{- if and .Values.abbenay.enabled .Values.abbenay.gcp.serviceAccountKey }}
{{- $hasVertexADC := false -}}
{{- range $name, $provider := .Values.abbenay.providers }}
  {{- if and (eq $provider.engine "vertex-anthropic") (not $provider.baseUrl) (not $provider.apiKey) (not $provider.apiKeySecret) }}
    {{- $hasVertexADC = true -}}
  {{- end }}
{{- end }}
{{- if $hasVertexADC }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apme.fullname" . }}-gcp-credentials
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
type: Opaque
stringData:
  service-account-key.json: {{ .Values.abbenay.gcp.serviceAccountKey | quote }}
{{- end }}
{{- end }}
