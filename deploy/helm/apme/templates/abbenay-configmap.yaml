{{- if .Values.abbenay.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apme.fullname" . }}-abbenay-config
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
data:
  config.yaml: |
    providers:
    {{- range $name, $provider := .Values.abbenay.providers }}
      {{ $name }}:
        engine: {{ $provider.engine }}
      {{- if $provider.baseUrl }}
        base_url: {{ $provider.baseUrl | quote }}
      {{- end }}
      {{- if or $provider.apiKey $provider.apiKeySecret }}
        api_key_env_var_name: {{ printf "ABBENAY_PROVIDER_%s" (upper (replace "-" "_" $name)) | quote }}
      {{- end }}
      {{- if and (eq $provider.engine "vertex-anthropic") (not $provider.baseUrl) }}
      {{- with $.Values.abbenay.gcp }}
      {{- if .project }}
        project_id: {{ .project | quote }}
      {{- end }}
      {{- if .location }}
        region: {{ .location | quote }}
      {{- end }}
      {{- end }}
      {{- end }}
        models:
      {{- range $model, $opts := $provider.models }}
          {{ $model }}: {{ $opts | toJson }}
      {{- end }}
    {{- end }}
    consumers:
      apme:
        token_env: APME_ABBENAY_TOKEN
        capabilities:
          inline_policy: true
{{- end }}
