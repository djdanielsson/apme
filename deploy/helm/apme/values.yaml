# APME Helm Chart — default values
# See ADR-054 for architecture rationale.
# The engine stack (Primary + validators + Galaxy Proxy) runs as sidecars in
# a single pod, preserving ADR-005 localhost networking and ADR-012 pod scaling.

image:
  registry: ghcr.io/ansible
  # -- Image tag for all APME containers.
  # CI publishes images with git SHA tags (e.g. "sha-7cb2464").
  # Set this explicitly; the fallback is Chart.yaml appVersion which is
  # informational and may not correspond to a published image tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Engine stack (Primary + all validators + Galaxy Proxy)
engine:
  replicas: 1
  # Recreate avoids RWO PVC conflicts during single-replica rolling updates.
  # Multi-replica deployments use emptyDir (no PVC conflict) and can safely
  # override this to RollingUpdate for zero-downtime upgrades.
  strategy:
    type: Recreate
  resources:
    primary:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    native:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    opa:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    ansible:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    gitleaks:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    collectionHealth:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    depAudit:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    galaxyProxy:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Spread engine pods across nodes when replicas > 1 (or HPA is active).
  # Example:
  #   topologySpreadConstraints:
  #     - maxSkew: 1
  #       topologyKey: kubernetes.io/hostname
  #       whenUnsatisfiable: ScheduleAnyway
  #       labelSelector:
  #         matchLabels:
  #           app.kubernetes.io/component: engine
  topologySpreadConstraints: []

# -- Gitleaks is optional (requires external binary in the image)
gitleaks:
  enabled: true

# -- Collection Health validator
collectionHealth:
  enabled: true

# -- Dependency Audit validator
depAudit:
  enabled: true

# -- Gateway (REST + gRPC reporting + SQLite persistence)
gateway:
  replicas: 1
  # Recreate avoids RWO PVC conflicts during rolling updates
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  feedback:
    enabled: false
    githubRepo: ""
    githubToken: ""

# -- UI (nginx-served React SPA)
# Set enabled: false when an external presentation layer (e.g. Ansible
# automation portal / Backstage) consumes the Gateway API instead.
# The stock nginx image requires writable /var/run, /var/cache/nginx, and
# /etc/nginx/conf.d.  The chart mounts emptyDir volumes for these paths so
# the container works under OCP restricted-v2 SCC (arbitrary non-root UID).
# For a proper long-term fix, rebuild the image on nginxinc/nginx-unprivileged.
ui:
  enabled: true
  replicas: 1
  securityContext: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Abbenay AI provider (optional)
# Abbenay is a unified AI daemon supporting 19+ LLM engines via the Vercel
# AI SDK.  Configure one or more providers below — the chart generates
# Abbenay's config.yaml and wires up secrets/volumes automatically.
# See docs/guides/ABBENAY_AI.md for GCP-specific setup.
abbenay:
  enabled: false
  image: ghcr.io/redhat-developer/abbenay:2026.4.1-alpha
  # -- Token APME uses to authenticate with Abbenay (required when enabled)
  token: ""
  # -- Override the default model APME selects (e.g. "vertex-claude/claude-sonnet-4-6")
  aiModel: ""
  # -- LLM providers.  Keys become provider names in Abbenay's config.yaml.
  # Each entry needs at minimum `engine` and `models`.
  # Auth options per provider (mutually exclusive):
  #   apiKey:       inline API key (Helm creates a Secret — avoid in production)
  #   apiKeySecret: reference to an existing K8s Secret { name, key }
  #   (omit both)   for engines that use ADC or need no auth (vertex-anthropic, ollama)
  #
  # Optional fields:
  #   baseUrl:   custom endpoint URL (proxies, self-hosted, Ollama, LM Studio)
  #   extraEnv:  list of additional env vars to inject [{name, value}]
  #
  # Examples — copy into providers: block below and adjust:
  #
  #   # OpenRouter (API-key engine)
  #   openrouter:
  #     engine: openrouter
  #     apiKey: "sk-or-..."            # OR use apiKeySecret below
  #     # apiKeySecret:
  #     #   name: my-openrouter-secret
  #     #   key: api-key
  #     models:
  #       anthropic/claude-sonnet-4-6: {}
  #       anthropic/claude-opus-4-6: {}
  #
  #   # Vertex AI Anthropic (GCP ADC — no API key needed)
  #   vertex-claude:
  #     engine: vertex-anthropic
  #     models:
  #       claude-sonnet-4-6: {}
  #       claude-sonnet-4-5: {}
  #       claude-haiku-4-5@20251001: {}
  #       claude-opus-4-6: {}
  #
  #   # Direct Anthropic API
  #   anthropic:
  #     engine: anthropic
  #     apiKeySecret:
  #       name: anthropic-credentials
  #       key: api-key
  #     models:
  #       claude-sonnet-4-6: {}
  #
  #   # Ollama (local, no auth)
  #   local-ollama:
  #     engine: ollama
  #     baseUrl: "http://ollama.default.svc:11434/v1"
  #     models:
  #       llama3.2: {}
  #
  #   # Corporate Vertex proxy (Bearer token auth)
  #   corp-vertex:
  #     engine: vertex-anthropic
  #     baseUrl: "https://your-proxy.example.com/models"
  #     apiKeySecret:
  #       name: vertex-proxy-token
  #       key: bearer-token
  #     models:
  #       claude-sonnet-4-6: {}
  #
  providers: {}

  # -- GCP credentials for vertex-anthropic engine (ADC authentication).
  # Only needed when a provider uses engine: vertex-anthropic without a
  # base_url/apiKey (i.e. direct Vertex AI, not a proxy).
  gcp:
    project: ""
    location: us-east5
    # -- Raw service-account JSON (Helm creates the Secret).
    # Prefer existingSecret in production to avoid putting keys in values files.
    serviceAccountKey: ""
    # -- Name of a pre-existing Secret containing a service-account-key.json key
    existingSecret: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Persistent volume claims
persistence:
  sessions:
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  gateway:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  proxyCache:
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# -- Ingress for Gateway REST API and UI
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: apme.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /
          pathType: Prefix
          service: ui
  tls: []

# -- OpenShift Route (alternative to Ingress for OCP clusters)
# Set route.host to serve the UI and API on the same domain (e.g.
# "apme.apps.ocp.example.com").  When host is empty, OpenShift
# auto-assigns a different host per Route and the UI/API will be on
# separate domains.
route:
  enabled: false
  host: ""
  annotations: {}
  tls:
    # Only "edge" termination is supported out of the box — backend services
    # (UI nginx, Gateway FastAPI) serve plain HTTP.  "reencrypt" and
    # "passthrough" require TLS-enabled backends and are not supported
    # without custom container builds.
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# -- Horizontal Pod Autoscaler for the engine Deployment
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Network policies for inter-service traffic (OCP clusters with default-deny)
networkPolicy:
  enabled: false

# -- PodDisruptionBudgets (protect availability during node drains)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# -- Pod-level security context.
# Defaults to empty so OCP restricted-v2 SCC can inject its own UID/GID range.
# For vanilla Kubernetes set: podSecurityContext: { fsGroup: 1000 }
podSecurityContext: {}

# -- Container-level security context.
# Defaults to empty so OCP restricted-v2 SCC can inject its own UID/GID range.
# For vanilla Kubernetes set: securityContext: { runAsNonRoot: true, runAsUser: 1000 }
securityContext: {}
