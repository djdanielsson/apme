---
# Intentionally contains hardcoded secrets to test gitleaks detection.
# DO NOT use real credentials here.
- name: Deploy app with hardcoded secrets
  hosts: webservers
  vars:
    db_password: "SuperSecret123!"
    aws_key: "AKIAIOSFODNN7EXAMPLE"
    api_token: "ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef12"
  tasks:
    - name: Configure database
      ansible.builtin.template:
        src: db.conf.j2
        dest: /etc/app/db.conf
        mode: "0600"

    - name: Set environment (safe - uses vault)
      ansible.builtin.lineinfile:
        path: /etc/environment
        line: "API_KEY={{ vault_api_key }}"

    - name: Set environment (unsafe - hardcoded)
      ansible.builtin.lineinfile:
        path: /etc/environment
        line: "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE"
